name: 📊 Profile Metrics

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Generate and commit metrics SVG
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          # Zero-setup: GITHUB_TOKEN provides basic public metrics.
          # For advanced plugins (wakatime, achievements, etc.), create a classic PAT
          # with 'repo' + 'read:user' scopes, save it as the METRICS_TOKEN secret,
          # and replace the token value below with ${{ secrets.METRICS_TOKEN }}.
          token: ${{ secrets.GITHUB_TOKEN }}

          # Output — commits assets/metrics.svg directly to main
          filename: assets/metrics.svg
          output_action: commit
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          committer_message: "chore: update metrics [skip ci]"

          # Base sections — keep minimal (header only); the rich visuals come from
          # the plugins below, so this card stays distinct from the GitHub stats section.
          base: header

          # Contribution isocalendar — 3D full-year heatmap (works with GITHUB_TOKEN)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Achievements — trophy-style highlights (works with GITHUB_TOKEN)
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          plugin_achievements_secrets: no

          # Language statistics (available with public token)
          plugin_languages: yes
          plugin_languages_details: "bytes-size, percentage"

          # Display / theme
          config_timezone: Europe/Berlin
          config_display: large
          template: classic
