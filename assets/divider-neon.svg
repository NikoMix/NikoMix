<svg xmlns="http://www.w3.org/2000/svg" width="900" height="24" viewBox="0 0 900 24" fill="none" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="dline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#FF2EC4" stop-opacity="0"/>
    </linearGradient>
    <filter id="dglow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="40" y1="12" x2="860" y2="12" stroke="url(#dline)" stroke-width="2" filter="url(#dglow)"/>
  <circle cx="450" cy="12" r="4" fill="#00E5FF" filter="url(#dglow)">
    <animate attributeName="cx" values="120;780;120" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#00E5FF;#FF2EC4;#7C4DFF;#00E5FF" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
