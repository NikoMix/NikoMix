<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" fill="none" role="img" aria-label="Niko Mix — Sr. Partner Solution Architect at Microsoft, Cloud and AI Platforms">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#FF2EC4"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05070A" stop-opacity="0.9"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#13314A" stroke-width="1" stroke-opacity="0.55"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round"><rect x="6" y="6" width="1188" height="288" rx="22"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect x="6" y="6" width="1188" height="288" rx="22" fill="#0D1117"/>
  <g clip-path="url(#round)">
    <rect x="6" y="6" width="1188" height="288" fill="url(#grid)"/>
    <rect x="6" y="6" width="1188" height="288" fill="url(#vignette)"/>

    <!-- animated scan sweep -->
    <rect x="-360" y="6" width="360" height="288" fill="url(#scan)">
      <animate attributeName="x" values="-360;1200" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- left circuit -->
    <g stroke="url(#neon)" stroke-width="2" fill="none" opacity="0.85">
      <path d="M40 70 H120 L150 100 H210" stroke-dasharray="6 10">
        <animate attributeName="stroke-dashoffset" values="0;-160" dur="3.5s" repeatCount="indefinite"/>
      </path>
      <path d="M40 150 H100 L130 120 H190" stroke-dasharray="6 10">
        <animate attributeName="stroke-dashoffset" values="0;-160" dur="4.2s" repeatCount="indefinite"/>
      </path>
      <path d="M40 230 H140 L168 200 H210" stroke-dasharray="6 10">
        <animate attributeName="stroke-dashoffset" values="0;-160" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- right circuit (mirrored) -->
    <g stroke="url(#neon)" stroke-width="2" fill="none" opacity="0.85">
      <path d="M1160 70 H1080 L1050 100 H990" stroke-dasharray="6 10">
        <animate attributeName="stroke-dashoffset" values="0;160" dur="3.8s" repeatCount="indefinite"/>
      </path>
      <path d="M1160 150 H1100 L1070 120 H1010" stroke-dasharray="6 10">
        <animate attributeName="stroke-dashoffset" values="0;160" dur="4.6s" repeatCount="indefinite"/>
      </path>
      <path d="M1160 230 H1060 L1032 200 H990" stroke-dasharray="6 10">
        <animate attributeName="stroke-dashoffset" values="0;160" dur="3.3s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- pulsing nodes -->
    <g fill="#00E5FF">
      <circle cx="210" cy="100" r="4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="190" cy="120" r="4" fill="#FF2EC4"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="210" cy="200" r="4" fill="#7C4DFF"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="990" cy="100" r="4"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="1010" cy="120" r="4" fill="#FF2EC4"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="990" cy="200" r="4" fill="#7C4DFF"><animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/></circle>
    </g>

    <!-- title block -->
    <g text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif">
      <text x="600" y="118" font-size="76" font-weight="800" fill="url(#neon)" filter="url(#softglow)" letter-spacing="2">Niko&#160;Mix</text>
      <text x="600" y="170" font-size="26" font-weight="700" fill="#E6EDF3" filter="url(#glow)" letter-spacing="0.5">Sr. Partner Solution Architect <tspan fill="#00E5FF">@Microsoft</tspan></text>
      <text x="600" y="206" font-size="18" font-weight="500" fill="#9FB3C8" letter-spacing="3">CLOUD &amp; AI PLATFORMS &#183; SME&amp;C EMEA &#183; GERMANY</text>
      <!-- accent underline -->
      <rect x="470" y="224" width="260" height="3" rx="1.5" fill="url(#neon)" filter="url(#glow)">
        <animate attributeName="width" values="0;260;0" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="x" values="600;470;600" dur="5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- neon frame -->
  <rect x="6" y="6" width="1188" height="288" rx="22" fill="none" stroke="url(#neon)" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
</svg>
